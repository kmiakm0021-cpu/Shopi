# Tema estilo Shopify para tu producto (Tripié Bluetooth)

Copia este código completo en tu archivo `index.html`.

```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DropTrip</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
position:fixed;
width:100%;
backdrop-filter:blur(12px);
background:rgba(0,0,0,0.4);
z-index:1000;
}

.logo{
font-size:1.5rem;
font-weight:800;
letter-spacing:1px;
}

.start-btn{
background:white;
color:black;
padding:12px 28px;
border-radius:999px;
text-decoration:none;
font-weight:700;
transition:0.3s;
}

.start-btn:hover{
transform:scale(1.05);
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:120px 20px 60px;
background:radial-gradient(circle at top,#1a1a1a,#090909);
}

.hero h1{
font-size:4rem;
max-width:850px;
line-height:1.1;
margin-bottom:20px;
font-weight:800;
}

.hero p{
font-size:1.2rem;
max-width:650px;
color:#cfcfcf;
margin-bottom:40px;
line-height:1.7;
}

.hero-buttons{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.main-btn{
background:white;
color:black;
padding:16px 34px;
border-radius:999px;
text-decoration:none;
font-weight:700;
transition:0.3s;
}

.main-btn:hover{
transform:translateY(-3px);
}

.secondary-btn{
border:1px solid #444;
color:white;
padding:16px 34px;
border-radius:999px;
text-decoration:none;
font-weight:600;
}

.hero img{
width:420px;
max-width:90%;
margin-top:60px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.features{
padding:100px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#121212;
padding:35px;
border-radius:25px;
transition:0.3s;
border:1px solid #1f1f1f;
}

.card:hover{
transform:translateY(-8px);
border-color:#3a3a3a;
}

.card h3{
margin-bottom:15px;
font-size:1.3rem;
}

.card p{
color:#b8b8b8;
line-height:1.7;
}

.showcase{
padding:80px 8%;
text-align:center;
}

.showcase h2{
font-size:3rem;
margin-bottom:20px;
}

.showcase p{
color:#b8b8b8;
max-width:700px;
margin:auto;
line-height:1.8;
margin-bottom:50px;
}

.showcase img{
width:100%;
max-width:950px;
border-radius:30px;
}
